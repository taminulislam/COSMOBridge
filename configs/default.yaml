# Default configuration for IL Multimodal Deep Learning

data:
  excel_path: "Activity coeff and Excess Enthalpy for Imaging.xlsx"
  image_dir: "Image"
  processed_dir: "data/processed"
  splits_dir: "data/splits"
  sheet_name: "Datasheet"
  target_columns:
    - "gamma1"
    - "gamma2"
    - "G_E"
    - "H_E"
    - "G_mix"
    - "H_vap"
    - "P"
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  random_seed: 42
  num_folds: 5

image:
  size: 224
  normalize_mean: [0.485, 0.456, 0.406]  # ImageNet defaults
  normalize_std: [0.229, 0.224, 0.225]
  augmentation:
    random_rotation: 30
    horizontal_flip: true
    vertical_flip: true
    color_jitter:
      brightness: 0.2
      contrast: 0.2
      saturation: 0.2
      hue: 0.1

model:
  # Vision encoder
  vision:
    backbone: "vit_small_patch16_224"  # or "resnet34"
    pretrained: true
    feature_dim: 768  # 768 for ViT, 512 for ResNet
    freeze_layers: 6  # freeze first N layers for transfer learning
    dropout: 0.3

  # Graph Neural Network
  graph:
    hidden_dim: 256
    num_layers: 4
    conv_type: "GAT"  # GCN, GAT, or GIN
    heads: 4  # for GAT
    dropout: 0.3
    pooling: "mean"  # mean, sum, or attention
    atom_feature_dim: 22
    bond_feature_dim: 7

  # Tabular DNN
  tabular:
    hidden_dims: [256, 128, 64]
    dropout: 0.3
    batch_norm: true
    activation: "relu"

  # Fusion
  fusion:
    method: "cross_attention"  # cross_attention, concat, or gated
    fused_dim: 512
    num_attention_heads: 8
    dropout: 0.3

  # Prediction head
  prediction:
    hidden_dims: [256, 128]
    dropout: 0.3
    num_targets: 7

training:
  batch_size: 32
  num_epochs: 200
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  optimizer: "adamw"
  scheduler: "cosine"
  warmup_epochs: 10
  early_stopping_patience: 20
  gradient_clip: 1.0
  task_weights:
    gamma1: 1.0
    gamma2: 1.0
    G_E: 1.0
    H_E: 1.0
    G_mix: 1.0
    H_vap: 0.5
    P: 0.5

generative:
  vae:
    latent_dim: 128
    hidden_dims: [512, 256]
    kl_weight: 0.01
    learning_rate: 1.0e-3
  gan:
    latent_dim: 128
    generator_dims: [256, 512]
    discriminator_dims: [512, 256]
    learning_rate: 2.0e-4

experiment:
  name: "il_multimodal"
  seed: 42
  device: "auto"  # auto, cuda, or cpu
  num_workers: 4
  log_dir: "logs"
  checkpoint_dir: "checkpoints"
